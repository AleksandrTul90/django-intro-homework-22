{% extends 'catalog/base.html' %}

{% block title %}Удалить статью — Блог{% endblock %}

{% block content %}
<h1 class="mb-4">Удаление статьи</h1>

<p class="lead">Вы уверены, что хотите удалить статью «{{ object.title }}»?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'blog:blog_detail' object.pk %}" class="btn btn-outline-secondary">Отмена</a>
</form>
{% endblock %}
