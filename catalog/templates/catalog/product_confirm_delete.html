{% extends 'catalog/base.html' %}

{% block title %}Удалить товар — Интернет-магазин{% endblock %}

{% block content %}
<h1 class="mb-4">Удаление товара</h1>

<p class="lead">Вы уверены, что хотите удалить товар «{{ object.name }}»?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'catalog:product_detail' object.pk %}" class="btn btn-outline-secondary">Отмена</a>
</form>
{% endblock %}
